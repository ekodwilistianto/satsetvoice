    // ==========================================
    // KOMPONEN GENERATOR SUARA UTAMA (TOOL)
    // ==========================================
    function VoiceTool() {
      const [text, setText] = useState('');
      const [voice, setVoice] = useState('Kore');
      const [style, setStyle] = useState('');
      const [speed, setSpeed] = useState(1);
      const [isLoading, setIsLoading] = useState(false);
      const [audioUrl, setAudioUrl] = useState(null);
      const [error, setError] = useState(null);
      const audioRef = useRef(null);

      const voices = [
        { id: 'Kore', name: 'Kore (Wanita)' },
        { id: 'Zephyr', name: 'Zephyr (Pria)' },
        { id: 'Puck', name: 'Puck (Pria)' },
        { id: 'Charon', name: 'Charon (Pria)' },
        { id: 'Fenrir', name: 'Fenrir (Pria)' },
        { id: 'Leda', name: 'Leda (Wanita)' },
        { id: 'Orus', name: 'Orus (Pria)' },
        { id: 'Aoede', name: 'Aoede (Wanita)' },
        { id: 'Callirrhoe', name: 'Callirrhoe (Wanita)' },
        { id: 'Autonoe', name: 'Autonoe (Wanita)' },
        { id: 'Enceladus', name: 'Enceladus (Pria)' },
        { id: 'Iapetus', name: 'Iapetus (Pria)' },
        { id: 'Umbriel', name: 'Umbriel (Pria)' },
        { id: 'Algieba', name: 'Algieba (Pria)' },
        { id: 'Despina', name: 'Despina (Wanita)' },
        { id: 'Erinome', name: 'Erinome (Wanita)' },
        { id: 'Algenib', name: 'Algenib (Pria)' },
        { id: 'Rasalgethi', name: 'Rasalgethi (Pria)' },
        { id: 'Laomedeia', name: 'Laomedeia (Wanita)' },
        { id: 'Achernar', name: 'Achernar (Pria)' },
        { id: 'Alnilam', name: 'Alnilam (Pria)' },
        { id: 'Schedar', name: 'Schedar (Wanita)' },
        { id: 'Gacrux', name: 'Gacrux (Wanita)' },
        { id: 'Pulcherrima', name: 'Pulcherrima (Wanita)' },
        { id: 'Achird', name: 'Achird (Wanita)' },
        { id: 'Zubenelgenubi', name: 'Zubenelgenubi (Pria)' },
        { id: 'Vindemiatrix', name: 'Vindemiatrix (Wanita)' },
        { id: 'Sadachbia', name: 'Sadachbia (Pria)' },
        { id: 'Sadaltager', name: 'Sadaltager (Pria)' },
        { id: 'Sulafat', name: 'Sulafat (Wanita)' }
      ];

      const styles = [
        { id: '', name: 'Normal (Default)' },
        { id: 'enthusiastic and excited', name: 'Semangat & Ceria' },
        { id: 'relaxed and casual', name: 'Santai & Kasual' },
        { id: 'formal and professional', name: 'Formal & Profesional' },
        { id: 'like a dramatic storyteller', name: 'Bercerita (Storytelling)' },
        { id: 'whispering', name: 'Berbisik' },
      ];

      useEffect(() => {
        if (audioRef.current) {
          audioRef.current.playbackRate = speed;
        }
      }, [speed]);

      const fetchWithRetry = async (url, options, retries = 5) => {
        const delays = [1000, 2000, 4000, 8000, 16000];
        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(url, options);
            if (!response.ok) {
              throw new Error(`Gagal menghubungi server AI (Error ${response.status})`);
            }
            return await response.json();
          } catch (err) {
            if (i === retries - 1) throw err;
            await new Promise(res => setTimeout(res, delays[i]));
          }
        }
      };

      const createWavFile = (pcmBase64, mimeType) => {
        const rateMatch = mimeType ? mimeType.match(/rate=(\d+)/) : null;
        const sampleRate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;

        const binaryString = window.atob(pcmBase64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        const pcmData = bytes.buffer;

        const numChannels = 1;
        const bitsPerSample = 16;
        const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
        const blockAlign = numChannels * (bitsPerSample / 8);
        const dataSize = pcmData.byteLength;
        const buffer = new ArrayBuffer(44 + dataSize);
        const view = new DataView(buffer);

        const writeString = (view, offset, string) => {
          for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
          }
        };

        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + dataSize, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, byteRate, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, bitsPerSample, true);
        writeString(view, 36, 'data');
        view.setUint32(40, dataSize, true);

        const pcmView = new Uint8Array(pcmData);
        const wavView = new Uint8Array(buffer, 44);
        wavView.set(pcmView);

        return new Blob([buffer], { type: 'audio/wav' });
      };

      const handleGenerate = async () => {
        if (!text.trim()) {
          setError('Teks tidak boleh kosong. Silakan masukkan teks terlebih dahulu.');
          return;
        }

        setIsLoading(true);
        setError(null);
        setAudioUrl(null);

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
        
        const safeText = text.replace(/\n+/g, ' . ');
        
        let promptText = `Narator: ${safeText}`;
        if (style) {
          promptText = `Make Narator sound ${style}.\n\nNarator: ${safeText}`;
        }

        const payload = {
          contents: [{
            parts: [{
              text: promptText
            }]
          }],
          generationConfig: {
            responseModalities: ["AUDIO"],
            speechConfig: {
              multiSpeakerVoiceConfig: {
                speakerVoiceConfigs: [
                  {
                    speaker: "Narator",
                    voiceConfig: {
                      prebuiltVoiceConfig: {
                        voiceName: voice
                      }
                    }
                  }
                ]
              }
            }
          }
        };

        try {
          const data = await fetchWithRetry(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload)
          });

          const part = data?.candidates?.[0]?.content?.parts?.[0];
          if (part && part.inlineData) {
            const base64Data = part.inlineData.data;
            const mimeType = part.inlineData.mimeType;
            
            const wavBlob = createWavFile(base64Data, mimeType);
            const urlBlob = URL.createObjectURL(wavBlob);
            setAudioUrl(urlBlob);
          } else {
            throw new Error('Respons tidak valid dari server.');
          }
        } catch (err) {
          setError('Terjadi kesalahan saat membuat suara. Silakan coba lagi. (' + err.message + ')');
        } finally {
          setIsLoading(false);
        }
      };

      const handleDownload = () => {
        if (!audioUrl) return;
        const a = document.createElement('a');
        a.href = audioUrl;
        a.download = `SatSet-Voice-${Date.now()}.wav`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };

      return (
        <div className="w-full max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-6 sm:p-8 space-y-8">
              
              <div className="space-y-3">
                <label htmlFor="text-input" className="block text-sm font-semibold text-slate-700">
                  Masukkan Teks Anda
                </label>
                <textarea
                  id="text-input"
                  rows="6"
                  className="w-full rounded-xl border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 bg-slate-50 p-4 text-slate-700 text-base resize-y transition-colors outline-none border focus:bg-white"
                  placeholder="Ketik teks yang ingin diubah menjadi suara natural di sini..."
                  value={text}
                  onChange={(e) => setText(e.target.value)}
                />
                <div className="text-right text-xs text-slate-400 font-medium">
                  {text.length} karakter
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <div className="space-y-3">
                  <label className="flex items-center gap-2 text-sm font-semibold text-slate-700">
                    <Volume2 size={16} className="text-blue-500"/>
                    Pilih Suara
                  </label>
                  <select
                    value={voice}
                    onChange={(e) => setVoice(e.target.value)}
                    className="w-full rounded-lg border-slate-200 bg-slate-50 p-3 text-sm focus:border-blue-500 focus:ring-blue-500 outline-none border shadow-sm cursor-pointer"
                  >
                    {voices.map(v => (
                      <option key={v.id} value={v.id}>{v.name}</option>
                    ))}
                  </select>
                </div>

                <div className="space-y-3">
                  <label className="flex items-center gap-2 text-sm font-semibold text-slate-700">
                    <Settings2 size={16} className="text-blue-500"/>
                    Gaya Bicara
                  </label>
                  <select
                    value={style}
                    onChange={(e) => setStyle(e.target.value)}
                    className="w-full rounded-lg border-slate-200 bg-slate-50 p-3 text-sm focus:border-blue-500 focus:ring-blue-500 outline-none border shadow-sm cursor-pointer"
                  >
                    {styles.map(s => (
                      <option key={s.id} value={s.id}>{s.name}</option>
                    ))}
                  </select>
                </div>

                <div className="space-y-3">
                  <label className="flex justify-between items-center text-sm font-semibold text-slate-700">
                    <span className="flex items-center gap-2">
                      <FastForward size={16} className="text-blue-500"/>
                      Kecepatan
                    </span>
                    <span className="bg-blue-100 text-blue-700 py-0.5 px-2 rounded-md text-xs">{speed.toFixed(1)}x</span>
                  </label>
                  <input
                    type="range"
                    min="0.5"
                    max="2"
                    step="0.1"
                    value={speed}
                    onChange={(e) => setSpeed(parseFloat(e.target.value))}
                    className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                  />
                  <div className="flex justify-between text-xs text-slate-400">
                    <span>Lambat</span>
                    <span>Normal</span>
                    <span>Cepat</span>
                  </div>
                </div>

              </div>

              {error && (
                <div className="bg-red-50 text-red-700 p-4 rounded-xl flex items-start gap-3 border border-red-100">
                  <AlertCircle className="shrink-0 mt-0.5" size={18} />
                  <p className="text-sm font-medium">{error}</p>
                </div>
              )}

              <div className="pt-2">
                <button
                  onClick={handleGenerate}
                  disabled={isLoading || !text.trim()}
                  className="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-8 rounded-xl flex items-center justify-center gap-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-lg active:scale-[0.98]"
                >
                  {isLoading ? (
                    <>
                      <Loader2 className="animate-spin" size={20} />
                      <span>Memproses Suara...</span>
                    </>
                  ) : (
                    <>
                      <Play size={20} fill="currentColor" />
                      <span>Generate Voice</span>
                    </>
                  )}
                </button>
              </div>

              {audioUrl && (
                <div className="mt-8 pt-8 border-t border-slate-100 animate-in fade-in slide-in-from-bottom-4 duration-500">
                  <div className="bg-slate-50 rounded-2xl p-6 border border-slate-200">
                    <div className="flex items-center gap-2 mb-4 text-emerald-600 font-semibold">
                      <CheckCircle2 size={20} />
                      <span>Suara berhasil dibuat!</span>
                    </div>
                    
                    <div className="flex flex-col sm:flex-row items-center gap-4">
                      <audio
                        ref={audioRef}
                        controls
                        src={audioUrl}
                        className="w-full outline-none h-12"
                        onLoadedMetadata={(e) => { e.target.playbackRate = speed; }}
                      />
                      
                      <button
                        onClick={handleDownload}
                        className="w-full sm:w-auto flex items-center justify-center gap-2 bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 font-medium py-3 px-6 rounded-xl transition-colors shadow-sm shrink-0"
                      >
                        <Download size={18} />
                        <span>Download Hasil Suara</span>
                      </button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          </div>
        </div>
      );
    }

    // Melakukan render komponen <App /> ke dalam div dengan id="root"
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
